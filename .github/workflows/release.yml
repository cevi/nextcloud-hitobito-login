name: release.yml

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to release (X.Y.Z)'
                required: true

            releaseType:
                description: 'Release type'
                required: true
                default: 'nightly'
                type: choice
                options:
                    - 'nightly'
                    - 'stable'

            privateKeyPassword:
                description: 'Password for signing private key'
                required: true
                type: string

jobs:
    check-version:
        runs-on: ubuntu-latest
        steps:
            -   name: Check version
                run: |
                    if ! [[ "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                        echo "Invalid version format. Use X.Y.Z."
                        exit 1
                    fi

    check-changelog:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Check changelog
                run: |
                    if ! grep -q "## \[${{ github.event.inputs.version }}\] - $(date +%F)" CHANGELOG.md; then
                        echo "Changelog entry for version ${{ github.event.inputs.version }} not found."
                        exit 1
                    fi

    lint-js:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Extract Node version
                run: |
                    NODE_VERSION=$(node -p "require('./package.json').volta.node")
                    echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_ENV

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
                    cache: 'npm'

            -   name: Install dependencies
                run: npm ci

            -   name: Run lint
                run: npm run lint

    lint-php:
        runs-on: ubuntu-latest
        env:
            COMPOSER_NO_DEV: 1
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: 8.1

            -   name: Get composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Cache dependencies
                uses: actions/cache@v4
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -   name: Install dependencies
                run: composer install --no-progress

            -   name: Run lint
                run: composer run-script lint

    build:
        runs-on: ubuntu-latest
        needs: [ check-version, check-changelog, lint-js, lint-php ]
        env:
            COMPOSER_NO_DEV: 1
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Extract Node version
                run: |
                    NODE_VERSION=$(node -p "require('./package.json').volta.node")
                    echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_ENV

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: ${{ env.NODE_VERSION }}
                    cache: 'npm'

            -   name: Install JS dependencies
                run: npm ci

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: 8.1

            -   name: Get composer cache directory
                id: composer-cache
                run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            -   name: Cache PHP dependencies
                uses: actions/cache@v4
                with:
                    path: ${{ steps.composer-cache.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                    restore-keys: ${{ runner.os }}-composer-

            -   name: Install PHP dependencies
                run: composer install --no-progress

            -   name: Build JS
                run: npm run build

            -   name: Create release archive
                run: |
                    mkdir -p hitobitologin
                    mv composer.json hitobitologin/composer.json
                    mv composer.lock hitobitologin/composer.lock
                    mv README.md hitobitologin/README.md
                    mv CHANGELOG.md hitobitologin/CHANGELOG.md
                    mv CODE_OF_CONDUCT.md hitobitologin/CODE_OF_CONDUCT.md
                    mv LICENSE hitobitologin/LICENSE
                    mv lib hitobitologin/lib
                    mv l10n hitobitologin/l10n
                    mv js hitobitologin/js
                    mv img hitobitologin/img
                    mv css hitobitologin/css
                    mv appinfo hitobitologin/appinfo
                    tar -czf hitobitologin-v${{ github.event.inputs.version }}.tar.gz hitobitologin

            -   name: Upload release artifact
                uses: actions/upload-artifact@v4
                with:
                    name: release-v${{ github.event.inputs.version }}
                    path: hitobitologin-v${{ github.event.inputs.version }}.tar.gz
                    retention-days: 1

    sign-release:
        runs-on: ubuntu-latest
        needs: build
        steps:
            -   name: Download release artifact
                uses: actions/download-artifact@v4
                with:
                    name: release-v${{ github.event.inputs.version }}
                    path: hitobitologin-v${{ github.event.inputs.version }}.tar.gz

            -   name: Extract private key
                run: |
                    echo "${{ secrets.NEXTCLOUD_SIGNING_KEY }}" > hitobitologin.key

            -   name: Sign release
                run: |
                    openssl dgst -sha512 -sign hitobitologin.key hitobitologin-v${{ github.event.inputs.version }}.tar.gz -passin pass:${{ github.event.inputs.privateKeyPassword }} | openssl base64 > signature.txt

            -   name: Upload signature artifact
                uses: actions/upload-artifact@v4
                with:
                    name: release-v${{ github.event.inputs.version }}-signature
                    path: signature.txt
                    retention-days: 1

    publish-github-release:
        runs-on: ubuntu-latest
        needs: sign-release
        permissions:
            contents: write
        steps:
            -   name: Download release artifact
                uses: actions/download-artifact@v4
                with:
                    name: release-v${{ github.event.inputs.version }}
                    path: hitobitologin-v${{ github.event.inputs.version }}.tar.gz

            -   uses: ncipollo/release-action@v1
                with:
                    artifacts: "release.tar.gz,foo/*.txt"
                    bodyFile: "body.md"

    publish-nextcloud-release:
        runs-on: ubuntu-latest
        needs: publish-github-release
        steps:
            -   name: Download signature artifact
                uses: actions/download-artifact@v4
                with:
                    name: release-v${{ github.event.inputs.version }}-signature
                    path: signature.txt
